[phases.setup]
nixPkgs = [
  "php83",
  "php83Extensions.pdo",
  "php83Extensions.pdo_pgsql",
  "php83Extensions.pgsql",
  "php83Extensions.mbstring",
  "php83Extensions.xml",
  "php83Extensions.curl",
  "php83Extensions.zip",
  "php83Extensions.bcmath",
  "php83Extensions.tokenizer",
  "php83Extensions.ctype",
  "php83Extensions.fileinfo",
  "php83Extensions.openssl",
  "composer"
]

[phases.build]
cmds = [
  "composer install --no-dev --optimize-autoloader",
  "curl -L https://github.com/dunglas/frankenphp/releases/latest/download/frankenphp-linux-x86_64 -o /usr/local/bin/frankenphp",
  "chmod +x /usr/local/bin/frankenphp"
]

[start]
cmd = "php artisan migrate --force 2>&1 && frankenphp php-server --listen 0.0.0.0:${PORT:-8000} --root public"
