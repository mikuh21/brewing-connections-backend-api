[phases.setup]
nixPkgs = [
  "php83",
  "php83Extensions.pdo",
  "php83Extensions.pdo_pgsql",
  "php83Extensions.pgsql",
  "php83Extensions.mbstring",
  "php83Extensions.xml",
  "php83Extensions.curl",
  "php83Extensions.zip",
  "php83Extensions.bcmath",
  "php83Extensions.tokenizer",
  "php83Extensions.ctype",
  "php83Extensions.fileinfo",
  "php83Extensions.openssl",
  "composer"
]

[phases.build]
cmds = [
  "composer install --no-dev --optimize-autoloader"
]

[start]
cmd = "php artisan config:clear && php artisan migrate --force && echo 'PORT is '$PORT && php -S 0.0.0.0:${PORT:-8000} -t public"
